<head>
<meta charset="UTF-8">

<style>
/* === TOKENS === */
:root,[data-theme="light"]{
  --color-bg:#f4f3ee;
  --color-surface:#ffffff;
  --color-surface-2:#f9f8f5;
  --color-surface-offset:#edeae4;
  --color-border:rgba(40,37,29,0.10);
  --color-divider:#e0ddd7;
  --color-text:#1a1814;
  --color-text-muted:#6b6860;
  --color-text-faint:#b0afa9;
  --color-text-inverse:#ffffff;
  --color-primary:#c8360a;
  --color-primary-hover:#a82a06;
  --color-gold:#d4960a;
  --color-green:#2e7d32;
  --color-blue:#0056a3;
  --shadow-sm:0 1px 3px rgba(0,0,0,0.07);
  --shadow-md:0 4px 16px rgba(0,0,0,0.09);
  --shadow-lg:0 12px 40px rgba(0,0,0,0.12);
  --radius-sm:0.375rem;
  --radius-md:0.5rem;
  --radius-lg:0.875rem;
  --radius-xl:1.25rem;
  --radius-full:9999px;
  --space-1:0.25rem;--space-2:0.5rem;--space-3:0.75rem;--space-4:1rem;
  --space-5:1.25rem;--space-6:1.5rem;--space-8:2rem;--space-10:2.5rem;
  --space-12:3rem;--space-16:4rem;
  --font-display:'Bebas Neue',sans-serif;
  --font-body:'Inter',sans-serif;
  --text-xs:clamp(0.75rem,0.7rem+0.25vw,0.8125rem);
  --text-sm:clamp(0.8125rem,0.78rem+0.25vw,0.9375rem);
  --text-base:clamp(0.9375rem,0.9rem+0.2vw,1rem);
  --text-lg:clamp(1.125rem,1rem+0.75vw,1.5rem);
  --text-xl:clamp(1.5rem,1.2rem+1.25vw,2.25rem);
  --text-hero:clamp(2.5rem,1.5rem+4vw,5rem);
  --transition:180ms cubic-bezier(0.16,1,0.3,1);
}
[data-theme="dark"]{
  --color-bg:#141210;
  --color-surface:#1c1a17;
  --color-surface-2:#222019;
  --color-surface-offset:#1a1814;
  --color-border:rgba(255,255,255,0.08);
  --color-divider:#2c2a25;
  --color-text:#e8e6e1;
  --color-text-muted:#918f89;
  --color-text-faint:#4a4844;
  --color-text-inverse:#1a1814;
  --color-primary:#e05a2b;
  --color-primary-hover:#f07040;
  --color-gold:#e8ae2e;
  --color-green:#5aaa5e;
  --color-blue:#4d9fdc;
  --shadow-sm:0 1px 3px rgba(0,0,0,0.3);
  --shadow-md:0 4px 16px rgba(0,0,0,0.35);
  --shadow-lg:0 12px 40px rgba(0,0,0,0.45);
}

/* === BASE === */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{-webkit-font-smoothing:antialiased;scroll-behavior:smooth}
body{font-family:var(--font-body);font-size:var(--text-base);color:var(--color-text);background:var(--color-bg);min-height:100dvh;line-height:1.55}
img,svg{display:block;max-width:100%}
button{cursor:pointer;background:none;border:none;font:inherit;color:inherit}
a,button{transition:color var(--transition),background var(--transition),box-shadow var(--transition)}

/* === HERO === */
.hero{
  background:var(--color-primary);
  color:#fff;
  padding:var(--space-12) var(--space-6);
  text-align:center;
  position:relative;
  overflow:hidden;
}
.hero::before{
  content:'';position:absolute;inset:0;
  background:repeating-linear-gradient(
    -45deg,
    rgba(255,255,255,0.03) 0px,
    rgba(255,255,255,0.03) 1px,
    transparent 1px,
    transparent 12px
  );
}
.hero-inner{position:relative;z-index:1;}
.hero-eyebrow{font-size:var(--text-sm);font-weight:600;letter-spacing:0.12em;text-transform:uppercase;opacity:0.8;margin-bottom:var(--space-3)}
.hero-title{font-family:var(--font-display);font-size:var(--text-hero);line-height:1;letter-spacing:0.02em;margin-bottom:var(--space-4)}
.hero-sub{font-size:var(--text-base);opacity:0.85;max-width:52ch;margin:0 auto var(--space-6)}
.hero-stats{display:flex;justify-content:center;gap:var(--space-8);flex-wrap:wrap}
.hero-stat{text-align:center}
.hero-stat-num{font-family:var(--font-display);font-size:var(--text-xl);line-height:1}
.hero-stat-label{font-size:var(--text-xs);opacity:0.75;text-transform:uppercase;letter-spacing:0.08em}

/* === NAV === */
.top-bar{
  position:sticky;top:0;z-index:100;
  background:var(--color-surface);
  border-bottom:1px solid var(--color-border);
  padding:var(--space-3) var(--space-6);
  display:flex;align-items:center;justify-content:space-between;
  box-shadow:var(--shadow-sm);
}
.top-bar-logo{font-family:var(--font-display);font-size:1.4rem;letter-spacing:0.05em;color:var(--color-primary)}
.top-bar-right{display:flex;gap:var(--space-3);align-items:center}
.tab-nav{display:flex;gap:var(--space-1);background:var(--color-surface-offset);padding:var(--space-1);border-radius:var(--radius-md)}
.tab-btn{
  font-size:var(--text-sm);font-weight:500;padding:var(--space-2) var(--space-4);
  border-radius:calc(var(--radius-md) - 2px);color:var(--color-text-muted);
  transition:all var(--transition);white-space:nowrap;
}
.tab-btn.active{background:var(--color-surface);color:var(--color-text);box-shadow:var(--shadow-sm)}
.tab-btn:hover:not(.active){color:var(--color-text)}
.theme-toggle{
  width:36px;height:36px;border-radius:var(--radius-md);
  display:flex;align-items:center;justify-content:center;
  border:1px solid var(--color-border);
  color:var(--color-text-muted);
}
.theme-toggle:hover{color:var(--color-text);background:var(--color-surface-offset)}

/* === CONTAINER === */
.container{max-width:1100px;margin:0 auto;padding:var(--space-10) var(--space-6)}
@media(max-width:768px){.container{padding:var(--space-6) var(--space-4)}}

/* === SECTION HEADER === */
.section-header{margin-bottom:var(--space-8)}
.section-tag{
  display:inline-flex;align-items:center;gap:var(--space-2);
  font-size:var(--text-xs);font-weight:600;letter-spacing:0.1em;text-transform:uppercase;
  color:var(--color-primary);margin-bottom:var(--space-3);
}
.section-tag::before{content:'';width:20px;height:2px;background:var(--color-primary)}
.section-title{font-family:var(--font-display);font-size:var(--text-xl);line-height:1.1;letter-spacing:0.02em}

/* === PLAYER CARDS === */
.players-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(min(320px,100%),1fr));gap:var(--space-5)}
.player-card{
  background:var(--color-surface);
  border:1px solid var(--color-border);
  border-radius:var(--radius-xl);
  overflow:hidden;
  box-shadow:var(--shadow-sm);
  transition:box-shadow var(--transition),transform var(--transition);
}
.player-card:hover{box-shadow:var(--shadow-md);transform:translateY(-2px)}
.player-header{
  padding:var(--space-5) var(--space-6) var(--space-4);
  background:var(--color-surface-2);
  border-bottom:1px solid var(--color-border);
  display:flex;align-items:center;gap:var(--space-4);
}
.player-avatar{
  width:48px;height:48px;border-radius:var(--radius-full);
  background:var(--color-primary);
  display:flex;align-items:center;justify-content:center;
  font-family:var(--font-display);font-size:1.5rem;color:#fff;
  flex-shrink:0;
}
.player-name{font-size:var(--text-base);font-weight:700}
.player-handle{font-size:var(--text-xs);color:var(--color-text-muted)}
.player-body{padding:var(--space-5) var(--space-6)}
.forecast-group{margin-bottom:var(--space-5)}
.forecast-group:last-child{margin-bottom:0}
.forecast-group-title{
  font-size:var(--text-xs);font-weight:600;letter-spacing:0.08em;text-transform:uppercase;
  color:var(--color-text-muted);margin-bottom:var(--space-3);
  padding-bottom:var(--space-2);border-bottom:1px solid var(--color-divider);
}
.forecast-row{display:flex;justify-content:space-between;align-items:center;padding:var(--space-2) 0;gap:var(--space-4)}
.forecast-label{font-size:var(--text-sm);color:var(--color-text-muted);flex:1}
.forecast-value{font-size:var(--text-sm);font-weight:600;text-align:right;flex-shrink:0}
.badge{
  display:inline-block;padding:2px 10px;border-radius:var(--radius-full);
  font-size:var(--text-xs);font-weight:600;
}
.badge-yes{background:color-mix(in oklch,var(--color-green) 12%,transparent);color:var(--color-green)}
.badge-no{background:color-mix(in oklch,var(--color-text-muted) 10%,transparent);color:var(--color-text-muted)}

/* === COMPARISON TABLE === */
.comparison-section{display:none}
.comparison-section.active{display:block}
.table-wrap{overflow-x:auto;border-radius:var(--radius-lg);box-shadow:var(--shadow-sm);border:1px solid var(--color-border)}
.cmp-table{border-collapse:collapse;width:100%;min-width:700px;background:var(--color-surface);font-size:var(--text-sm)}
.cmp-table th{
  background:var(--color-surface-2);font-weight:600;font-size:var(--text-xs);
  text-transform:uppercase;letter-spacing:0.07em;color:var(--color-text-muted);
  padding:var(--space-4) var(--space-5);text-align:left;
  border-bottom:1px solid var(--color-border);white-space:nowrap;
}
.cmp-table td{
  padding:var(--space-4) var(--space-5);
  border-bottom:1px solid var(--color-divider);
  vertical-align:middle;
}
.cmp-table tr:last-child td{border-bottom:none}
.cmp-table tr:hover td{background:var(--color-surface-2)}
.cmp-table .row-label{font-weight:600;color:var(--color-text-muted);white-space:nowrap}
.highlight-cell{color:var(--color-primary);font-weight:700}

/* === TABS CONTENT === */
.tab-content{display:none}
.tab-content.active{display:block}

/* === RESPONSIVE === */
@media(max-width:600px){
  .hero-stats{gap:var(--space-6)}
  .top-bar{padding:var(--space-3) var(--space-4)}
  .tab-nav{gap:0}
  .tab-btn{padding:var(--space-2) var(--space-3);font-size:0.75rem}
}
</style>
</head>

<!-- TOP BAR -->
<header class="top-bar">

// Avatar colors
const AVATAR_COLORS = ['#c8360a','#0056a3','#2e7d32','#8b5e00','#6b2fa0','#c4780a'];

function initials(name){
  return name.split(' ').map(p=>p[0]).join('').toUpperCase().slice(0,2);
}

function badge(val){
  const yes = val === 'Да';
  return `<span class="badge ${yes?'badge-yes':'badge-no'}">${val}</span>`;
}

// ── CARDS TAB ─────────────────────────────────────────────────────────────────
function buildCards(){
  const grid = document.getElementById('players-grid');
  PLAYERS.forEach((p,i)=>{
    const s1=p.stage1, s2=p.stage2;

        <div class="forecast-group">

        </div>
      </div>
    </article>`);
  });
}

// ── COMPARE TAB ───────────────────────────────────────────────────────────────
function buildCompare(){
  const thead = document.getElementById('cmp-thead');
  const tbody = document.getElementById('cmp-tbody');

  // Header
  let ths = `<tr><th>Вопрос</th>` + PLAYERS.map((p,i)=>
    `<th style="color:${AVATAR_COLORS[i]}">${p.full_name.split(' ')[0]}</th>`
  ).join('') + `</tr>`;
  thead.innerHTML = ths;

  // Rows
  const rows = [
    ['🥇 Победитель', p => p.stage1.s1_winner],
    ['🥈 2-е место',  p => p.stage1.s1_second],
    ['🥉 3-е место',  p => p.stage1.s1_third],
    ['Голы Роналду', p => p.stage1.s1_ronaldo],
    ['Голы Месси',   p => p.stage1.s1_messi],
    ['Голы Мбаппе',  p => p.stage1.s1_mbappe],
    ['Хет-трик',     p => p.stage1.s1_hattrick],
    ['Вылетит 1-й',  p => p.stage1.s1_firstout],
    ['Всего голов',  p => p.stage1.s1_totalgoals],
    ['Аутсайдер 1/4',p => p.stage2.s2_outsider],
    ['Серий пен. 1/4',p=> p.stage2.s2_penalties_qf],
    ['Удар в серии', p => p.stage2.s2_pen_series],
    ['Макс. голов',  p => p.stage2.s2_max_goals],
  ];

  tbody.innerHTML = rows.map(([label, fn])=>{
    const vals = PLAYERS.map(fn);
    return `<tr>
      <td class="row-label">${label}</td>
      ${vals.map(v=>`<td>${v}</td>`).join('')}
    </tr>`;
  }).join('');
}

// ── FINAL TAB ─────────────────────────────────────────────────────────────────
function buildFinal(){
  const grid = document.getElementById('final-grid');
  PLAYERS.forEach((p,i)=>{
    const s3=p.stage3;
    grid.insertAdjacentHTML('beforeend',`
    <article class="player-card">
      <div class="player-header">
        <div class="player-avatar" style="background:${AVATAR_COLORS[i]}">${initials(p.full_name)}</div>
        <div>
          <div class="player-name">${p.full_name}</div>
          ${p.username?`<div class="player-handle">@${p.username}</div>`:''}
        </div>
      </div>
      <div class="player-body">
        <div class="forecast-group">
          <div class="forecast-group-title">🏟️ Этап 3 — Финал</div>
          <div class="forecast-row"><span class="forecast-label">Счёт финала</span><span class="forecast-value highlight-cell" style="font-size:1.1em">${s3.s3_score}</span></div>
          <div class="forecast-row"><span class="forecast-label">Итог</span><span class="forecast-value">${s3.s3_final_end}</span></div>
          <div class="forecast-row"><span class="forecast-label">Жёлтые карточки</span><span class="forecast-value">${s3.s3_yellow}</span></div>
          <div class="forecast-row"><span class="forecast-label">Пенальти в матче</span><span class="forecast-value">${badge(s3.s3_penalty)}</span></div>
          <div class="forecast-row"><span class="forecast-label">Красная карточка</span><span class="forecast-value">${badge(s3.s3_redcard)}</span></div>
        </div>
      </div>
    </article>`);
  });
}

// ── TABS ──────────────────────────────────────────────────────────────────────
document.querySelectorAll('.tab-btn').forEach(btn=>{
  btn.addEventListener('click',()=>{
    const target = btn.dataset.tab;
    document.querySelectorAll('.tab-btn').forEach(b=>{b.classList.remove('active');b.setAttribute('aria-selected','false')});
    document.querySelectorAll('.tab-content').forEach(c=>c.classList.remove('active'));
    btn.classList.add('active');btn.setAttribute('aria-selected','true');
    document.getElementById('tab-'+target).classList.add('active');
  });
});

// ── THEME ─────────────────────────────────────────────────────────────────────
(function(){
  const t=document.querySelector('[data-theme-toggle]'),r=document.documentElement;
  let d=matchMedia('(prefers-color-scheme:dark)').matches?'dark':'light';
  r.setAttribute('data-theme',d);
  const sunSVG=`<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>`;
  const moonSVG=`<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>`;
  if(d==='dark')t.innerHTML=sunSVG;
  t.addEventListener('click',()=>{
    d=d==='dark'?'light':'dark';
    r.setAttribute('data-theme',d);
    t.innerHTML=d==='dark'?sunSVG:moonSVG;
  });
})();

// ── INIT ──────────────────────────────────────────────────────────────────────
buildCards();
buildCompare();
buildFinal();
</script>
</body>
</html>
